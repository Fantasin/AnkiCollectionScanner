[pytest]
testpaths = anki_collection_scanner/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = venv .git __pycache__ build dist

addopts =
    -ra
    --strict-markers
    --tb=short
    --durations=10

markers =
    unit: fast isolated tests
    integration: external dependencies
    slow: long running tests